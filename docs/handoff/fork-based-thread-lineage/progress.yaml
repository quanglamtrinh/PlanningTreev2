migration_id: fork_based_thread_lineage
status: phase_6_complete
current_phase: null
next_phase: 7

references:
  specs:
    - docs/specs/fork-based-thread-lineage-state-machine.md
    - docs/specs/fork-based-thread-lineage-delta-migration-plan.md
  plan_doc: docs/handoff/fork-based-thread-lineage/README.md

resolved_blockers:
  - id: blocker_1
    title: ask_planning uses superset tools
    status: resolved
    resolution: >
      ask_planning is created with thread-level superset shaping tools
      (emit_frame_content, emit_spec_content, emit_clarify_questions).
      generation services reuse ask_planning instead of owning separate threads.
      legacy ask sessions are resumed in place and rely on stdout fallback parsing
      until reset or rebuild.
  - id: blocker_2
    title: keep ask seeding temporarily
    status: resolved
    resolution: >
      keep temporary ask handoff seeding through Phase 4. remove it only after
      Phase 5 wires first-turn child activation prompt injection from storage.
  - id: blocker_3
    title: split always goes through lineage helper
    status: resolved
    resolution: >
      split must always resolve parent.audit through ThreadLineageService and may
      never assume a raw parent audit thread_id is already present.

phases:
  - phase: 1
    pr: 1
    name: schema_and_compatibility_scaffolding
    status: completed
    depends_on: []
    goals:
      - add lineage metadata fields to ChatSession
      - migrate integration.json toward audit.json
      - route integration reads and writes to audit during the compatibility window
    exit_criteria:
      - backend session schema includes all five lineage fields with safe defaults
      - integration alias works in read_session, write_session, and clear_session
      - new writes no longer recreate integration.json
    verification:
      - chat state store tests cover lineage defaults and alias behavior
    notes: >
      Completed on 2026-03-25. Added lineage fields to ChatSession storage and frontend
      typing, routed integration read/write/clear through audit, and added lazy
      integration.json -> audit.json migration coverage. Verified with backend
      chat-state-store unit tests and frontend TypeScript typecheck.

  - phase: 2
    pr: 2
    name: thread_lineage_helper_and_prompt_builder_prep
    status: completed
    depends_on:
      - 1
    goals:
      - add ThreadLineageService
      - centralize start, fork, resume, and rebuild decisions
      - prepare prompt builders for later workflow-boundary injection
    exit_criteria:
      - lineage helper covers lazy audit bootstrap, legacy detection, and ancestor rebuild
      - prompt builders needed by later phases exist with test coverage
    verification:
      - lineage helper unit tests cover bootstrap, fork, resume, legacy backfill, and rebuild
    notes: >
      Completed on 2026-03-25. Added backend/services/thread_lineage_service.py,
      exposed it via app.state.thread_lineage_service, added storage-backed prompt
      builder prep helpers, and kept workflow callers unchanged. Verified with
      python -m pytest backend/tests/unit/test_chat_state_store_multithread.py
      backend/tests/unit/test_thread_lineage_service.py
      backend/tests/unit/test_phase2_prompt_builders.py -q. Follow-up review fixed
      the legacy root audit source-path backfill gap so descendant forks inherit
      lineage_root_thread_id correctly from legacy root sessions.

  - phase: 3
    pr: 3
    name: ask_lineage_lazy_audit_bootstrap_and_generation_consolidation
    status: completed
    depends_on:
      - 2
    goals:
      - fork ask_planning from audit
      - keep root audit lazy instead of attach-time
      - move frame/spec/clarify generation onto ask_planning
    exit_criteria:
      - ask_planning sessions are created through the lineage helper
      - generation services stop storing their own thread_id
      - temporary ask seeding remains active for child handoff safety
    verification:
      - ask tests prove fork behavior and lazy audit bootstrap
      - generation tests prove reuse of ask_planning thread
    notes: >
      Completed on 2026-03-25. ChatService now bootstraps task ask/audit sessions
      through ThreadLineageService on read and send, new ask_planning sessions use
      shared superset shaping tools, and frame/spec/clarify generation now reuses
      ask_planning instead of service-owned threads. Generation state files no
      longer persist thread_id, temporary child ask seeding remains in place for
      Phase 5 replacement, and verification passed with:
      python -m pytest backend/tests/unit/test_chat_service.py
      backend/tests/unit/test_thread_seeding.py
      backend/tests/unit/test_thread_readonly.py
      backend/tests/unit/test_frame_generation_service.py
      backend/tests/unit/test_spec_generation_service.py
      backend/tests/unit/test_clarify_generation_service.py
      backend/tests/unit/test_shaping_freeze.py
      backend/tests/unit/test_finish_task_service.py
      backend/tests/unit/test_thread_lineage_service.py -q
      plus targeted integration smoke for backend/tests/integration/test_chat_api.py
      covering bootstrap-on-read, child ask seeding, and partial-session polling.

  - phase: 4
    pr: 4
    name: execution_fork_and_local_review_boundary_injection
    status: completed
    depends_on:
      - 3
    goals:
      - fork execution from task audit
      - inject execution artifacts at the local review boundary
    exit_criteria:
      - execution uses lineage helper fork creation
      - local review context is injected on first relevant audit turn only
    verification:
      - finish task tests assert execution forks from audit
      - local review prompt tests assert first-turn-only injection
    notes: >
      Completed on 2026-03-25. FinishTaskService now creates execution threads
      through ThreadLineageService.ensure_forked_thread(..., source_role="audit",
      fork_reason="execution_bootstrap"), execution session initialization now
      preserves lineage metadata instead of clearing it, and execution_state
      gained local_review_started_at/local_review_prompt_consumed_at markers.
      Audit chat now switches to build_local_review_prompt(...) only while the
      local-review boundary is open and marks the boundary consumed only after a
      successful audit turn, preserving retry behavior after failed turns.
      Post-review cleanup also updated the finish-task integration fake to
      implement fork_thread() and corrected historical docs so the local-review
      marker is described accurately as execution-state metadata, not audit
      session state.
      Verification completed with python -m py_compile on touched backend/test
      files plus manual service-layer smoke proving execution fork lineage,
      first-turn-only local review injection, and failed-first-turn retry
      retention. Targeted pytest remains blocked on this workstation by temp
      directory permission errors during tmp-path setup/cleanup.

  - phase: 5
    pr: 5
    name: split_migration_true_review_and_child_forks
    status: completed
    depends_on:
      - 2
      - 3
    goals:
      - move split onto parent.audit
      - fork review.audit and child.audit from true upstream threads
      - replace temporary child ask seeding with successful-turn child activation injection
    exit_criteria:
      - split no longer stores a project-level thread_id
      - review and child audits are forked through the lineage helper
      - temporary ask seeding is removed after child activation retries and reset semantics are preserved
    verification:
      - split and review tests assert review.audit and child.audit fork behavior
      - child/package prompt tests assert success-based boundary consumption and retry behavior
    notes: >
      Completed on 2026-03-25. SplitService now resolves parent.audit through
      ThreadLineageService, no longer persists project-level split_state.thread_id,
      and accepts either emit_render_data tool output or raw JSON stdout fallback
      from legacy audit threads. Post-persist split bootstrap now eagerly forks
      review.audit from parent.audit and child.audit from review.audit, while
      ReviewService eagerly forks newly activated sibling audits best-effort
      without rolling back accepted checkpoints if bootstrap fails. Review rollup
      state now tracks package_review_started_at and
      package_review_prompt_consumed_at, ChatService now injects package-review
      and child-activation context on the first relevant successful turns only.
      Temporary ask_planning seeding has been removed, child activation now
      stays open across failed first ask turns and reopens after ask reset, and
      later healing of missing child.audit now preserves review-based lineage
      instead of falling back to audit_lazy_bootstrap when review ancestry
      exists. Split/review eager bootstrap remains best-effort; the stricter
      behavior applies only to later healing-on-access in ThreadLineageService.
      A follow-up fix moved local/package boundary consumption ahead of
      active_turn clearing to avoid a race that could double-inject prompt
      context on fast retries. Verified with python -m py_compile on touched
      backend/test files and a combined pytest pass covering:
      backend/tests/unit/test_split_service.py
      backend/tests/unit/test_review_service.py
      backend/tests/unit/test_chat_service.py
      backend/tests/unit/test_review_state_store.py
      backend/tests/unit/test_thread_seeding.py
      backend/tests/unit/test_node_document_service.py
      backend/tests/unit/test_shaping_freeze.py
      backend/tests/integration/test_split_api.py
      backend/tests/integration/test_node_documents_api.py
      backend/tests/integration/test_chat_api.py
      -> 135 passed.

  - phase: 6
    pr: 6
    name: review_node_cutover_to_audit
    status: completed
    depends_on:
      - 5
    goals:
      - move review nodes from integration to audit
      - close the compatibility window
    exit_criteria:
      - review backend uses audit exclusively
      - frontend ThreadRole drops integration
      - UI shows Review Audit
    verification:
      - backend tests stop using integration thread role
      - frontend tests assert Review Audit labels and audit routing
    notes: >
      Completed on 2026-03-25. Review-node chat semantics now use `audit`
      end-to-end: ChatService only allows review-node audit, review audit is
      read-only for users, ReviewService now persists rollup messages/events/live
      turns in `audit`, and rollup prompt assembly now loads checkpoint/package
      context from storage via build_rollup_prompt_from_storage(...) instead of
      integration seed messages. ChatStateStore no longer accepts the public
      `integration -> audit` alias and now rejects explicit unknown roles rather
      than silently falling back to ask_planning, while still keeping lazy
      integration.json -> audit.json migration for historical data. Frontend
      ThreadRole removed `integration`, review breadcrumbs now resolve to
      `audit`, and UI labels/tooltips now say `Review Audit` / `Open review audit`.
      Active contract docs were updated to match the new review.audit model.
      Verified with:
      .\.venv\Scripts\python.exe -m pytest -p no:cacheprovider
      backend/tests/unit/test_chat_state_store_multithread.py
      backend/tests/unit/test_thread_readonly.py
      backend/tests/unit/test_thread_seeding.py
      backend/tests/unit/test_review_service.py -q
      -> 58 passed
      .\.venv\Scripts\python.exe -m pytest -p no:cacheprovider
      backend/tests/integration/test_chat_api.py
      backend/tests/integration/test_review_api.py
      backend/tests/integration/test_lifecycle_e2e.py -q
      -> 34 passed
      npx vitest run tests/unit/BreadcrumbChatView.test.tsx
      from frontend/
      -> 10 passed.

  - phase: 7
    pr: 7
    name: recovery_hardening_and_cleanup
    status: not_started
    depends_on:
      - 6
    goals:
      - route all recovery through ThreadLineageService
      - retire thread_seed_service.py
      - leave compatibility migration only where historical data still needs it
    exit_criteria:
      - thread_seed_service.py is deleted
      - rebuild paths are covered for each supported thread role and node type
      - integration-specific naming is cleaned up
    verification:
      - rebuild-path tests pass
      - seed-service imports are fully removed
    notes: ""

deferred_cleanup:
  - id: gating_decoupling
    status: deferred
    summary: >
      execution_gating.py still uses local audit-record markers in session JSON.
      this is acceptable for the lineage rollout because those markers are local-only,
      but migrating readiness checks to dedicated state-file fields is deferred until
      after Phase 7.

update_rules:
  - set current_phase when active implementation work begins
  - move a phase status through not_started -> in_progress -> completed
  - record blocker discoveries in the matching phase notes field
  - update verification results before marking a phase completed
