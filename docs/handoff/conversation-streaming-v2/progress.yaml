migration_id: conversation_streaming_v2
status: phase_6_in_progress
current_phase: 6
next_phase: 6

references:
  specs:
    - docs/specs/conversation-streaming-v2.md
    - docs/specs/type-contracts-v2.md
  plan_doc: docs/handoff/conversation-streaming-v2/README.md

locked_decisions:
  - id: canonical_backend_snapshot
    status: locked
    decision: backend transcript source of truth is ThreadSnapshotV2
  - id: canonical_frontend_items
    status: locked
    decision: frontend source of truth is canonical ConversationItem[]
  - id: direct_rendering
    status: locked
    decision: UI renders directly from item.kind without semantic mapping
  - id: no_message_pair
    status: locked
    decision: no pair-based user and assistant creation semantics exist in V2
  - id: tool_identity
    status: locked
    decision: upstream typed item id is canonical tool identity
  - id: audit_bundle_cutover
    status: locked
    decision: execution plus the entire audit namespace cut over together before ask_planning
  - id: metadata_sync
    status: locked
    decision: all metadata-bearing mutations synchronize through thread.snapshot
  - id: file_change_final_list
    status: locked
    decision: fileChange authoritative final file lists use outputFilesReplace

phases:
  - phase: 0
    name: contract_freeze_and_fixture_capture
    status: completed
    depends_on: []
    goals:
      - freeze the canonical item schema, patch schema, API contract, and runtime contract
      - capture raw fixtures for every required upstream event class
      - remove field ambiguity before implementation starts
    exit_criteria:
      - sections 5, 6, 7, and 8 of the active spec are treated as frozen contract
      - backend and frontend both have fixture corpora to replay against
      - no unresolved field-level ambiguity remains for projector or reducer work
    verification:
      - fixture replay matrix exists
      - contract review sign-off is recorded
    artifacts:
      - docs/specs/conversation-streaming-v2.md
      - docs/handoff/conversation-streaming-v2/artifacts/
    notes: >
      Completed on 2026-03-28. The active spec sections for schema, patch contract,
      API contract, lifecycle, and raw mapping are frozen in docs/specs, the Phase 0
      raw-event corpus now contains replayable adapter-captured on_raw_event payloads
      for every required event class, and the fixture manifest plus contract review
      checklist were updated accordingly. Open upstream "always" guarantees remain
      logged in artifacts/phase-0/open-questions.md as non-blocking follow-up questions.

  - phase: 1
    name: codex_client_event_expansion
    status: completed
    depends_on:
      - 0
    goals:
      - preserve itemId on deltas
      - surface reasoning, file-change, turn-completed, and request-resolved details
      - make projector input lossless enough for V2
    exit_criteria:
      - codex_client exposes every raw field required by the V2 mapping table
      - no critical projector path depends on guessed or missing ids
    verification:
      - targeted unit tests cover adapted event payloads
    artifacts:
      - docs/handoff/conversation-streaming-v2/phase-1-codex-client-expansion.md
    notes: >
      Completed and verified on 2026-03-28, even while Phase 0 contract freeze remains the
      active sequencing phase. The codex client adapter now exposes additive `on_raw_event`
      coverage for the Phase 0 mapping table, buffers and replays early raw events safely,
      enriches resolved user-input payloads with both request and item identity, and preserves
      raw tool-call payload context. Regression follow-ups also landed in chat_service and
      thread_lineage_service to close bootstrap-on-read and rollout sandbox gaps discovered
      during review. Verification commands completed successfully:
      `backend/tests/unit/test_codex_client.py`,
      `backend/tests/unit/test_codex_client_sandbox.py`,
      `backend/tests/unit/test_chat_service.py`,
      `backend/tests/unit/test_finish_task_service.py`,
      `backend/tests/unit/test_review_service.py`,
      `backend/tests/unit/test_thread_lineage_service.py`.

  - phase: 2
    name: canonical_backend_core
    status: completed
    depends_on:
      - 1
    goals:
      - implement ThreadSnapshotV2, registry, projector, runtime, query, and V2 routes
      - enforce persist-before-publish and first-frame thread.snapshot
      - establish metadata synchronization rules in code
    exit_criteria:
      - replayed fixtures produce deterministic snapshots
      - GET plus SSE does not lose events
      - message_created does not exist in V2
    verification:
      - backend unit and integration coverage for projector, query, and stream open sequence
    artifacts:
      - docs/handoff/conversation-streaming-v2/phase-2-backend-core.md
    notes: >
      Completed on 2026-03-28. The backend now includes canonical V2 domain
      types, thread snapshot and registry stores, a pure projector, request
      ledger behavior, shared runtime and query services, separate V2 conversation
      and workflow brokers, and additive `/v2` routes with wrapped `ok/data` or
      `ok/error` envelopes. Focused verification covers stores, patch semantics,
      metadata repair publishing `thread.snapshot`, reset emitting `thread.reset`
      plus a fresh snapshot, workflow V2 stream envelopes, and adapter-captured
      fixture replay from artifacts/phase-0/raw-event-samples.jsonl with no
      spec drift observed. Phase 3 consumer migration can now start from the
      landed V2 abstractions and route surface.

  - phase: 3
    name: consumer_and_audit_writer_migration
    status: completed
    depends_on:
      - 2
    goals:
      - migrate transcript and metadata consumers behind V2 abstractions
      - migrate immutable audit writers off V1 helper paths
      - make thread_registry_service the registry-first authoritative metadata writer while retaining legacy session mirroring during mixed mode
    exit_criteria:
      - critical transcript consumers route through V2 abstractions where available, and audit readiness checks are V2-first with explicit temporary V1 fallback during mixed mode
      - node_detail_service and review_service no longer write audit namespace through V1 immutable append helpers
      - no production metadata write path bypasses thread_registry_service as the first write target during mixed mode
    verification:
      - targeted backend tests plus executable guard for legacy helper usage
    artifacts:
      - docs/handoff/conversation-streaming-v2/phase-3-consumer-migration.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-3/consumer-migration-matrix.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-3/audit-writer-cutover-check.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-3/code-search-evidence.md
    notes: >
      Completed on 2026-03-28. Frame-generation transcript history now routes through
      ThreadTranscriptBuilder, audit marker readiness checks are V2-first with temporary
      V1 fallback, immutable frame/spec/rollup audit writers now land in canonical V2
      audit snapshot items, and ThreadLineageService writes registry metadata first while
      preserving legacy session mirroring and legacy session-shaped returns for mixed-mode
      callers. This phase is registry-first and V2-first, not yet sole-writer or V2-only.
      Focused verification passed for transcript, gating, runtime-backed and fallback
      audit writer paths, node-detail confirm routes, review, lineage, chat,
      snapshot-view, clarify/spec, split, and review API paths.

  - phase: 4
    name: frontend_v2
    status: completed
    depends_on:
      - 2
    goals:
      - ship a hidden `/chat-v2` breadcrumb surface backed by V2 conversation transport only
      - preserve breadcrumb shell parity, route-to-project sync, review-node layout parity, and local-review acceptance parity
      - implement V2 reducer, router, hydration, renderers, workflow bridge, and stale-response guards
    exit_criteria:
      - hidden `/chat-v2` behaves like a breadcrumb surface instead of a thread-only demo
      - reducer applies canonical events only and ignores stale responses or stale SSE payloads
      - UI renders directly from item.kind and does not depend on semantic mapping
      - reset-thread exists on hidden ask-planning only when writable and converges through `thread.reset` plus `thread.snapshot`
      - local-review acceptance parity is preserved, including tab reset to ask before `/chat-v2` sibling navigation
    verification:
      - frontend unit and route tests plus focused V1 regression checks
    artifacts:
      - docs/handoff/conversation-streaming-v2/phase-4-frontend-v2.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-4/README.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-4/implementation-notes.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-4/verification-notes.md
    notes: >
      Completed on 2026-03-28. Hidden `/chat-v2` route, V2 transport helpers,
      V2 thread store with generation-token stale guards, direct render-by-kind
      components, workflow bridge hook, local-review acceptance parity, and
      ask-thread reset action are landed and verified. Final focused verification
      passed for `npm run typecheck` and the dedicated V2 plus V1 regression suite
      (`47` tests across `6` files). The broader frontend unit suite still has a
      single unrelated failure in `tests/unit/NodeDetailCard.test.tsx` (`shows
      execution lifecycle badge separately from coarse node status`, expecting
      `Execution Complete`). Triage shows that failure stays in the legacy detail
      panel path and does not involve hidden `/chat-v2` or V2 conversation modules,
      so it is documented as baseline noise and waived for Phase 4 closeout. A
      post-closeout hardening pass also landed direct coverage for degraded
      `resolveUserInput` fallback behavior, reset button gating plus
      `thread.reset` and `thread.snapshot` convergence, and workflow bridge
      refresh or reconnect behavior. Phase 5 may now treat `/chat-v2` as the
      rehearsal surface while detail-state and local-review acceptance remain
      intentional side-channel boundaries.

  - phase: 5
    name: isolated_execution_and_audit_rehearsal
    status: completed
    depends_on:
      - 3
      - 4
    goals:
      - rehearse execution and audit bundle on isolated inputs
      - prove tool collapse, file-change replacement, user-input resolution, and workflow bridge correctness
      - enforce the no-V1-audit-write gate before production cutover
    exit_criteria:
      - rehearsal path has no production workspace side effects
      - no production audit writer remains on V1 helper paths
      - fileChange authoritative final lists overwrite preview lists correctly
    verification:
      - end-to-end rehearsal evidence and targeted integration tests
    artifacts:
      - docs/handoff/conversation-streaming-v2/phase-5-isolated-rehearsal.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-5/README.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-5/rehearsal-runbook.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-5/rehearsal-results.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-5/no-v1-audit-writers-check.md
    notes: >
      Completed on 2026-03-28. Execution and review-rollup now have a
      server-flagged rehearsal branch that writes canonical V2 execution and
      audit snapshots through ThreadRuntimeService and the shared projector,
      rejects workspaces outside PLANNINGTREE_REHEARSAL_WORKSPACE_ROOT, and
      keeps legacy transcript events off the rehearsal path. Focused unit and
      integration coverage now verifies safety rejection, execution plus rollup
      V2 snapshots, no-legacy-event behavior, authoritative fileChange final
      lists, and continued no-V1-audit-writer coverage. Phase 6 can build on
      this branch for the first production execution plus audit cutover.

  - phase: 6
    name: execution_and_audit_cutover
    status: in_progress
    depends_on:
      - 5
    goals:
      - cut execution to V2
      - cut the full audit namespace to V2
      - enable workflow bridge in production
      - close semantic presentation parity gaps for execution and audit V2 surfaces
    exit_criteria:
      - execution and audit both use V2 contract end to end
      - no audit producer writes V1 transcript state
      - execution and audit V2 surfaces satisfy semantic presentation parity goals defined in the phase-6 handoff doc
      - command terminal interaction semantics reach canonical tool items and the V2 feed
    verification:
      - targeted production-like integration pass
      - semantic parity unit and integration coverage
    artifacts:
      - docs/handoff/conversation-streaming-v2/phase-6-execution-audit-cutover.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-6/README.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-6/cutover-checklist.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-6/smoke-results.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-6/rollback-notes.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-6/semantic-presentation-parity-plan.md
      - docs/handoff/conversation-streaming-v2/artifacts/phase-6/semantic-parity-verification.md
    notes: >
      In progress on 2026-03-28. A dedicated production flag
      (`PLANNINGTREE_EXECUTION_AUDIT_V2_ENABLED`) now gates the first production
      V2 cutover bundle for execution plus the entire audit namespace. Finish-task
      production paths now enter the shared V2 runtime, execution auto-review now
      runs through canonical audit thread items instead of the legacy accumulator,
      review rollup production routing now uses the same V2 runtime branch as
      rehearsal, and frontend graph, sidebar, `/chat`, and `/chat-v2` routing now
      canonicalize execution or audit traffic onto `/chat-v2` while redirecting
      ask back to `/chat`. Focused verification currently passes for targeted
      backend unit coverage, a new Phase 6 production integration test, and the
      route-level frontend unit suite. Review against the active spec and
      CodexMonitor parity shows the phase is not yet closeable because semantic
      presentation remains too flat: the V2 feed still lacks a dedicated
      view-state layer, semantic working-indicator behavior, grouped tool
      rendering, near-bottom auto-scroll semantics, reasoning-derived progress
      labels, and command terminal-interaction projection into canonical tool
      output. Remaining work now includes both rollout evidence and the semantic
      parity closeout plan tracked in the phase-6 handoff doc.

  - phase: 7
    name: ask_planning_cutover
    status: not_started
    depends_on:
      - 6
    goals:
      - move ask_planning to the same V2 runtime, reducer, and snapshot contract
      - retire dual-read transcript logic
    exit_criteria:
      - all three thread roles use the V2 item model
      - ask_planning no longer depends on V1 transcript state
    verification:
      - ask-planning integration and UI coverage
    artifacts:
      - docs/handoff/conversation-streaming-v2/phase-7-ask-planning-cutover.md
    notes: ""

  - phase: 8
    name: hard_cutover_and_cleanup
    status: not_started
    depends_on:
      - 7
    goals:
      - remove V1 routes, stores, mappers, and accumulators
      - leave only the V2 conversation path in production
    exit_criteria:
      - no render path uses legacy content or parts
      - no production service reads legacy session transcript schema
      - legacy files are deleted or fail fast
    verification:
      - full targeted backend plus frontend regression suite
    artifacts:
      - docs/handoff/conversation-streaming-v2/phase-8-hard-cutover-cleanup.md
    notes: ""

update_rules:
  - set current_phase when active implementation work begins
  - update notes and blockers before moving any phase to blocked
  - record verification evidence before marking a phase completed
  - keep the active spec aligned with any accepted contract change
