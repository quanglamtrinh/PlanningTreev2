locked_decisions:
  - id: v3_contract_is_canonical
    status: locked
    decision: ThreadSnapshotV3 and V3 event envelope are the canonical contract.
  - id: registry_first_identity
    status: locked
    decision: Thread registry remains source of truth for role<->threadId binding.
  - id: no_v2_adapter_in_v3_final
    status: locked
    decision: Final /v3 route path cannot depend on project_v2_snapshot_to_v3 or project_v2_envelope_to_v3.
  - id: stream_first_frame
    status: locked
    decision: V3 stream must emit thread.snapshot.v3 as first non-heartbeat frame.
  - id: stream_guard_mismatch
    status: locked
    decision: after_snapshot_version mismatch must return conversation_stream_mismatch.
  - id: ask_gate_contract
    status: locked
    decision: ask_v3_disabled (409) semantics remain unchanged while gate exists.
  - id: reset_policy
    status: locked
    decision: by-id reset remains ask-only; execution/audit reset by-id returns invalid_request.

effort_model:
  total_effort_percent: 100
  total_person_day_estimate_range: "42-57"

phases:
