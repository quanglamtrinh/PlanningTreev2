    name: baseline_and_contract_freeze
    status: in_progress
    effort_percent: 8
    estimate_person_days: "3-4"
    depends_on: []
    primary_owner: "BE + FE lead"
    exit_criteria:
      - Behavior matrix from existing tests is frozen.
      - Error and policy semantics are frozen.
      - Contradictory legacy docs are reconciled for this track.

  - phase: 1
    name: v3_domain_store_foundation
    status: pending
    effort_percent: 12
    estimate_person_days: "5-7"
    depends_on:
