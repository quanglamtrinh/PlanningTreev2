locked_decisions:
  - id: canonical_thread_role_naming
    status: locked
    decision: Public V3 contract uses thread_role as canonical naming; lane terminology is deprecated.
  - id: thread_role_transition_phased
    status: locked
    decision: thread_role/threadRole is canonical from Phase 1 at domain/store level; while /v3 routes still depend on V2 adapters (Phase 1-2), legacy lane may remain in compatibility payloads. Enforced sequence is Phase 3 threadRole-primary route output (temporary lane dual-emit allowed only as migration bridge), Phase 5 frontend lane-read removal, and Phase 7 lane emission/type/test cleanup.
  - id: v3_contract_is_canonical
    status: locked
    decision: ThreadSnapshotV3 and V3 event envelope are the canonical contract.
  - id: workflow_control_plane_v3_contract
    status: locked
    decision: Frontend workflow control plane uses /v3 workflow-state, /v3 workflow actions, and /v3 project events endpoints.
  - id: workflow_control_plane_v3_active_path
    status: locked
    decision: Primary active frontend workflow path must call only the locked /v3 workflow-state, workflow actions, and project events endpoints.
  - id: compatibility_bridge_phase2
    status: locked
    decision: Compatibility read bridge starts in Phase 2 (read v3 first, fallback read-through from v2, then persist v3; no v2 back-write).
  - id: compatibility_bridge_modes_and_sunset
    status: locked
    decision: Bridge mode is explicit (enabled | allowlist | disabled); disabled mode must return conversation_v3_missing for missing V3 snapshots and must not fallback to V2.
  - id: conversation_v3_missing_error_contract
    status: locked
    decision: conversation_v3_missing uses HTTP 409 and the standard envelope shape with error.details = {}.
  - id: compatibility_bridge_env_only_config
    status: locked
    decision: Bridge mode is controlled by env only using PLANNINGTREE_CONVERSATION_V3_BRIDGE_MODE and PLANNINGTREE_CONVERSATION_V3_BRIDGE_ALLOWLIST.
  - id: workflow_v3_events_endpoint_owner
    status: locked
    decision: Canonical owner for GET /v3/projects/{project_id}/events is backend/routes/workflow_v3.py.
  - id: registry_first_identity
    status: locked
    decision: Thread registry remains source of truth for role<->threadId binding.
  - id: no_v2_adapter_in_v3_final
    status: locked
    decision: Final /v3 route path cannot depend on project_v2_snapshot_to_v3 or project_v2_envelope_to_v3.
  - id: stream_first_frame
    status: locked
    decision: V3 stream must emit thread.snapshot.v3 as first non-heartbeat frame.
  - id: stream_guard_mismatch
    status: locked
    decision: after_snapshot_version mismatch must return conversation_stream_mismatch.
  - id: ask_gate_contract
    status: locked
    decision: ask_v3_disabled (409) semantics remain unchanged while gate exists.
  - id: reset_policy
    status: locked
    decision: by-id reset remains ask-only; execution/audit reset by-id returns invalid_request.

