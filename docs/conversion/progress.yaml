      - Final architecture and operations docs are complete.

update_rules:
  - Keep exactly one phase in_progress at a time.
  - Update status and notes before switching phases.
  - Attach verification evidence before marking completed.
  - If a phase is blocked, record blocker owner and unblock plan.

