    status: pending
    effort_percent: 14
    estimate_person_days: "6-8"
    depends_on:
      - 1
    primary_owner: "BE"
    exit_criteria:
      - Query and runtime V3 services run ask/execution/audit natively.
      - Ask legacy mirroring is removed from runtime path.

  - phase: 3
    name: v3_route_native_cutover
    status: pending
    effort_percent: 12
    estimate_person_days: "4-6"
    depends_on:
      - 2
    primary_owner: "BE"
    exit_criteria:
      - workflow_v3 routes no longer call V2 query/runtime services.
      - Snapshot and stream behavior parity is preserved.

  - phase: 4
    name: workflow_service_cutover
    status: pending
    effort_percent: 18
    estimate_person_days: "8-10"
    depends_on:
      - 3
    primary_owner: "BE"
    exit_criteria:
      - finish-task/execution/audit/review services use V3 core only.
      - No execution/audit write path touches legacy chat session transcript.

  - phase: 5
    name: frontend_control_plane_v3
    status: pending
    effort_percent: 14
    estimate_person_days: "6-8"
    depends_on:
      - 4
    primary_owner: "FE"
    exit_criteria:
      - Frontend workflow state/action/event bridge uses V3 endpoints.
